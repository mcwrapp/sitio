<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>POP ART — Galería</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body class="page-galeria">

<header class="site-header">
  <div class="header-inner header-grid">
    <button class="hamburger" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>

    <a class="logo" href="../index.html">
      <img src="../img/logo.png" alt="POP ART">
    </a>

    <form class="search">
      <input type="search" placeholder="Buscar...">
      <button type="submit">Buscar</button>
    </form>
  </div>
</header>

<div class="stage">
<main>

<section class="gallery-cloud">
  <img src="../img/nube3.png" alt="Galería">
</section>

<section class="gallery-grid gallery-squares">
  <figure class="work-item"><img src="../img/obra1.png" alt="Obra 1"></figure>
  <figure class="work-item"><img src="../img/obra2.png" alt="Obra 2"></figure>
  <figure class="work-item"><img src="../img/obra3.png" alt="Obra 3"></figure>
  <figure class="work-item"><img src="../img/obra4.png" alt="Obra 4"></figure>
</section>

<section class="gallery-grid gallery-wide">
  <figure class="work-item"><img src="../img/obra5.png" alt="Obra 5"></figure>
  <figure class="work-item"><img src="../img/obra6.png" alt="Obra 6"></figure>
  <figure class="work-item"><img src="../img/obra7.png" alt="Obra 7"></figure>
</section>

<div class="gallery-bottomspacer"></div>

</main>
</div>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-left">
      <ul class="socials">
        <li><a class="btn-social" href="#"><img src="../img/insta.jpg"></a></li>
        <li><a class="btn-social" href="#"><img src="../img/twitter.jpg"></a></li>
        <li><a class="btn-social" href="#"><img src="../img/facebook.jpg"></a></li>
      </ul>
      <div class="contactos">
        <a href="mailto:popartoficial@gmail.com">popartoficial@gmail.com</a>
        <a href="tel:+5491180841625">+54 9 11 8084 1625</a>
      </div>
    </div>

    <div class="footer-center">
      <img class="footer-logo" src="../img/logo-b.png">
    </div>

    <div class="footer-right">
      <p>© 2025 POP ART — Todos los derechos reservados</p>
    </div>
  </div>
</footer>
<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <img src="" id="img-ampliada">
</div>

<script src="../js/script.js"></script>
</body>
</html>
