<!doctype html>
<html lang="es">
<head>

<title>POP ART — Contacto</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body class="page-contacto">

<header class="site-header">
  <div class="header-inner header-grid">
    <button class="hamburger">
      <span></span><span></span><span></span>
    </button>

    <a class="logo" href="../index.html">
      <img src="../img/logo.png" alt="POP ART">
    </a>

    <form class="search">
      <input type="search" placeholder="Buscar...">
      <button>Buscar</button>
    </form>
  </div>
</header>

<div class="stage">
<main>

<section class="contact-cloud">
  <img src="../img/nube5.png" alt="Contacto">
</section>


<form class="contact-form" action="../enviar.php" method="post">

  <label>Nombre y apellido</label>
  <input name="nombre" type="text" required>

  <label>Correo electrónico</label>
  <input name="email" type="email" required>

  <label>Motivo</label>
  <select name="asunto" required>
    <option value="">Elegí una opción…</option>
    <option value="consulta">Consulta general</option>
    <option value="feedback">Sugerencia / feedback</option>
    <option value="tecnico">Reporte técnico</option>
  </select>

  <label>Mensaje</label>
  <textarea name="mensaje" rows="5" required></textarea>

  <button type="submit">Enviar</button>

</form>

<section class="contact-cards">
  <img class="contact-card" src="../img/red1.png">
  <img class="contact-card" src="../img/red2.png">
  <img class="contact-card" src="../img/red3.png">
  <img class="contact-card" src="../img/red4.png">
  <img class="contact-card" src="../img/red5.png">
</section>

<section class="contact-textblock">
  <img src="../img/texto3.png">
</section>

<div class="contact-bottomspacer"></div>

</main>
</div>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-left">
      <ul class="socials">
        <li><a class="btn-social" href="#"><img src="../img/insta.jpg"></a></li>
        <li><a class="btn-social" href="#"><img src="../img/twitter.jpg"></a></li>
        <li><a class="btn-social" href="#"><img src="../img/facebook.jpg"></a></li>
      </ul>
      <div class="contactos">
        <a href="mailto:popartoficial@gmail.com">popartoficial@gmail.com</a>
        <a href="tel:+5491180841625">+54 9 11 8084 1625</a>
      </div>
    </div>

    <div class="footer-center">
      <img class="footer-logo" src="../img/logo-b.png">
    </div>

    <div class="footer-right">
      <p>© 2025 POP ART — Todos los derechos reservados</p>
    </div>
  </div>
</footer>

</body>
</html>
